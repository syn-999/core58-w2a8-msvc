name: Bug report
description: Report a reproducible defect in the documented CPU, GPU, build, or packaging flows.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Short description of the failure.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or commit SHA.
      placeholder: v0.1.8 or 2aea052
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, CPU, GPU, and driver/toolkit details if relevant.
      placeholder: Windows 11, Python 3.11, RTX 4070 SUPER, CUDA 12.1
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      description: Paste the exact command or API request that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs or attach screenshots.
